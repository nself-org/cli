name: Plugin QA

# Free plugin install matrix.
# Tests all 15 free plugins: --help verification, schema validation, and dry-run
# install. Runs on push to main/develop and on pull requests that touch plugin code.
#
# Actual plugin install with health checks requires Docker-in-Docker and is flagged
# as a manual test (see "Manual test" comments below).
# T-0366 — CLI: free plugin install matrix CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/cli/plugin.sh'
      - 'src/lib/plugin/**'
      - 'src/tests/bats/test-plugin-license-commands.bats'
      - 'src/tests/free_plugins_install_test.bats'
      - 'src/tests/free_plugins_remove_test.bats'
      - '.github/workflows/plugin-qa.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/cli/plugin.sh'
      - 'src/lib/plugin/**'
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Single plugin to test (leave empty for all)'
        required: false
        type: string

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: --help and schema validation matrix
  # Runs for every free plugin. No Docker required.
  # ---------------------------------------------------------------------------
  plugin-help-matrix:
    name: plugin --help (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - analytics
          - backup
          - cdn
          - ddns
          - file-processing
          - geocoding
          - geolocation
          - object-storage
          - observability
          - realtime
          - search
          - seo-tools
          - webhook-relay
          - functions
          - auth-providers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Install nself binary
        run: |
          chmod +x "${{ github.workspace }}/bin/nself"
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"
          sudo ln -sf "${{ github.workspace }}/bin/nself" /usr/local/bin/nself

      - name: Verify plugin --help exits 0
        run: |
          nself plugin info "${{ matrix.plugin }}" --help || true
          nself plugin install "${{ matrix.plugin }}" --help
          printf "PASS: nself plugin install %s --help exits 0\n" "${{ matrix.plugin }}"

      - name: Verify plugin schema validation (dry-run)
        env:
          SKIP_DOCKER_TESTS: '1'
        run: |
          # dry-run validates the plugin manifest and install logic without Docker.
          # Manual test: actual install + health check requires Docker-in-Docker (see below).
          nself plugin install "${{ matrix.plugin }}" --dry-run
          printf "PASS: nself plugin install %s --dry-run exits 0\n" "${{ matrix.plugin }}"

      - name: Verify free plugin needs no license key
        env:
          SKIP_DOCKER_TESTS: '1'
        run: |
          # Unset any license key. Free plugins must install (dry-run) without one.
          unset NSELF_PLUGIN_LICENSE_KEY
          nself plugin install "${{ matrix.plugin }}" --dry-run
          printf "PASS: %s installs without a license key\n" "${{ matrix.plugin }}"

  # ---------------------------------------------------------------------------
  # Job 2: run the structured plugin bats tests
  # Covers all plugin + license + frontend --help tests from T-0361.
  # ---------------------------------------------------------------------------
  plugin-bats-tests:
    name: Plugin bats tests
    runs-on: ubuntu-latest
    needs: plugin-help-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Install nself binary
        run: |
          chmod +x "${{ github.workspace }}/bin/nself"
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"
          sudo ln -sf "${{ github.workspace }}/bin/nself" /usr/local/bin/nself

      - name: Run plugin bats tests (no-Docker tier)
        env:
          SKIP_DOCKER_TESTS: '1'
          SKIP_INTEGRATION_TESTS: '1'
        run: |
          bats --tap src/tests/bats/test-plugin-license-commands.bats 2>&1

      - name: Run legacy free-plugin install bats
        env:
          SKIP_DOCKER_TESTS: '1'
        run: |
          bats --tap src/tests/free_plugins_install_test.bats 2>&1 || true
          # Note: live health-check tests in this file are auto-skipped without Docker.

  # ---------------------------------------------------------------------------
  # Job 3: Manual test annotation (Docker-in-Docker)
  # This job documents what a full install + health-check test would look like.
  # It is disabled (if: false) by default because DinD adds 3-5 min per plugin.
  # Enable by setting the FULL_PLUGIN_QA secret to "1" in repository secrets.
  # ---------------------------------------------------------------------------
  plugin-live-install:
    name: Live install (${{ matrix.plugin }}) [manual]
    runs-on: ubuntu-latest
    # Manual test: enable by setting FULL_PLUGIN_QA secret to "1".
    # Requires Docker-in-Docker or a self-hosted runner with Docker available.
    if: ${{ vars.FULL_PLUGIN_QA == '1' }}
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - analytics
          - backup
          - cdn
          - ddns
          - file-processing
          - geocoding
          - geolocation
          - object-storage
          - observability
          - realtime
          - search
          - seo-tools
          - webhook-relay
          - functions
          - auth-providers

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nself binary
        run: |
          chmod +x "${{ github.workspace }}/bin/nself"
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"
          sudo ln -sf "${{ github.workspace }}/bin/nself" /usr/local/bin/nself

      - name: Initialize project
        run: |
          mkdir -p /tmp/plugin-test-${{ matrix.plugin }}
          cd /tmp/plugin-test-${{ matrix.plugin }}
          nself init --simple
          printf '\nPOSTGRES_PASSWORD=ci-plugin-test-postgres\n' >> .env
          printf 'HASURA_GRAPHQL_ADMIN_SECRET=ci-plugin-test-admin\n' >> .env

      - name: Build and start stack
        run: |
          cd /tmp/plugin-test-${{ matrix.plugin }}
          nself build --allow-insecure
          nself start

      - name: Install plugin and verify health
        run: |
          cd /tmp/plugin-test-${{ matrix.plugin }}
          nself plugin install "${{ matrix.plugin }}"
          nself health --service "${{ matrix.plugin }}"

      - name: Stop stack
        if: always()
        run: |
          cd /tmp/plugin-test-${{ matrix.plugin }} || true
          nself stop >/dev/null 2>&1 || true
