name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # Required for SARIF uploads

jobs:
  shellcheck:
    name: ShellCheck Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck with security rules
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # Check for security issues (SC2006, SC2086, SC2046, etc.)
          # Fail on errors, warn on security-related issues
          # SC1091: Can't follow source (external files)
          # SC2259: False positive for heredocs in CI/CD YAML generation
          find . -type f -name "*.sh" -exec shellcheck -S error -e SC1091,SC2259 {} + || exit_code=$?
          if [ $exit_code -ne 0 ]; then
            printf "\033[31mShellCheck found security issues\033[0m\n"
            exit 1
          fi

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy for dependency vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          # BLOCKING: only CRITICAL dependency vulnerabilities fail the pipeline
          # HIGH vulnerabilities appear in GitHub Security tab (SARIF) but do not block
          exit-code: '1'
          # Templates are scaffolding copied to user projects; the CLI itself does not
          # run these packages — exclude from blocking CRITICAL scan
          skip-dirs: src/templates

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan Docker base images
        run: |
          # Scan Docker base images used in templates
          printf "\033[34mScanning Docker base images...\033[0m\n"

          # Extract base images from Dockerfiles
          base_images=$(find src/templates -name "Dockerfile*" -exec grep -h "^FROM" {} \; | awk '{print $2}' | sort -u)

          for image in $base_images; do
            printf "\033[33mScanning: %s\033[0m\n" "$image"
            # ADVISORY: Upstream base images may have known vulns we can't immediately fix
            # Scans are informational; review results manually and update base images when patches available
            # Allow scan failures (rate limits, network issues, or image pull failures)
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity HIGH,CRITICAL "$image" || echo "::warning::Base image scan failed or found vulnerabilities: $image"
          done

  container-scan:
    name: Container Image Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test images
        run: |
          # Build a few representative service templates for scanning
          printf "\033[34mBuilding test images...\033[0m\n"

          # Express API
          if [ -d "src/templates/services/js/express-js" ]; then
            if docker build -t nself-test:express-js \
              --build-arg SERVICE_NAME=test-api \
              --build-arg PORT=3000 \
              src/templates/services/js/express-js/; then
              echo "::notice::Built nself-test:express-js"
            else
              echo "::warning::Failed to build Express template (may need full nself pipeline)"
            fi
          fi

          # FastAPI
          if [ -d "src/templates/services/py/fastapi" ]; then
            if docker build -t nself-test:fastapi \
              --build-arg SERVICE_NAME=test-api \
              --build-arg PORT=8000 \
              src/templates/services/py/fastapi/; then
              echo "::notice::Built nself-test:fastapi"
            else
              echo "::warning::Failed to build FastAPI template (may need full nself pipeline)"
            fi
          fi

      - name: Scan built images with Trivy
        run: |
          images=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "nself-test:" || echo "")
          if [ -z "$images" ]; then
            printf "\033[33mNo test images to scan (builds may have failed)\033[0m\n"
            exit 0
          fi

          scan_failed=0
          for image in $images; do
            printf "\033[34mScanning image: %s\033[0m\n" "$image"
            # FAIL CI if our built images have critical vulnerabilities
            if ! docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity HIGH,CRITICAL "$image"; then
              echo "::error::Found HIGH/CRITICAL vulnerabilities in $image"
              scan_failed=1
            fi
          done

          if [ $scan_failed -eq 1 ]; then
            echo "::error::Security scan failed - fix vulnerabilities in service templates"
            exit 1
          fi

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        # Run semgrep CLI directly — the returntocorp/semgrep-action@v1 action was deprecated
        # when returntocorp was rebranded to semgrep and the v1 action requires SEMGREP_APP_TOKEN
        # to authenticate, causing "0 annotations" failures without a token configured.
        # Running the CLI locally avoids the authentication requirement entirely.
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/docker \
            --exclude src/templates \
            --exclude src/tests \
            --error \
            .
        # BLOCKING: SAST findings (security-audit, OWASP Top 10) must fail the pipeline

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for license headers
        run: |
          printf "\033[34mChecking license headers...\033[0m\n"

          # Check that LICENSE file exists
          if [ ! -f "LICENSE" ]; then
            printf "\033[31mERROR: LICENSE file not found\033[0m\n"
            exit 1
          fi

          # Check for any GPL/AGPL licenses in dependencies
          printf "\033[33mChecking for restrictive licenses...\033[0m\n"

          # This is a basic check - in production you'd use a proper tool
          find . -name "LICENSE*" -o -name "COPYING*" | while read -r file; do
            if grep -i "GPL\|AGPL" "$file" >/dev/null 2>&1; then
              printf "\033[31mWARNING: Restrictive license found in %s\033[0m\n" "$file"
            fi
          done

  docker-bench:
    name: Docker Security Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run Docker Bench Security
        run: |
          printf "\033[34mRunning Docker Bench Security checks...\033[0m\n"

          # Check Dockerfiles for security best practices
          # Use -q on all grep calls to suppress output (avoids spurious GitHub annotations)
          # and || true on the pipeline to prevent pipefail from propagating grep exit codes.
          while IFS= read -r dockerfile; do
            printf "\033[33mChecking: %s\033[0m\n" "$dockerfile"

            # Check for USER instruction (non-root)
            if ! grep -q "^USER" "$dockerfile"; then
              printf "\033[31m  WARNING: No USER instruction (runs as root)\033[0m\n"
            fi

            # Check for HEALTHCHECK
            if ! grep -q "^HEALTHCHECK" "$dockerfile"; then
              printf "\033[33m  INFO: No HEALTHCHECK instruction\033[0m\n"
            fi

            # Check for hardcoded secrets (use -q to avoid printing secret content)
            if grep -qE "PASSWORD|SECRET|TOKEN|KEY" "$dockerfile" && \
               grep -E "PASSWORD|SECRET|TOKEN|KEY" "$dockerfile" | grep -qvE "^(ARG|ENV)"; then
              printf "\033[31m  WARNING: Possible hardcoded secrets in %s\033[0m\n" "$dockerfile"
            fi

            # Check for latest tag (use -q to avoid printing FROM lines as annotations)
            if grep -q "^FROM.*:latest" "$dockerfile"; then
              printf "\033[33m  INFO: Using :latest tag (prefer specific versions)\033[0m\n"
            fi
          done < <(find src/templates -name "Dockerfile*") || true

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [shellcheck, secret-scan, dependency-scan, sast, license-check]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate security summary
        run: |
          printf "# Security Scan Summary\n\n" > security-report.md
          printf "**Scan Date:** %s\n\n" "$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> security-report.md

          printf "## Job Results\n\n" >> security-report.md
          printf -- "- ShellCheck: %s\n" "${{ needs.shellcheck.result }}" >> security-report.md
          printf -- "- Secret Scanning: %s\n" "${{ needs.secret-scan.result }}" >> security-report.md
          printf -- "- Dependency Scanning: %s\n" "${{ needs.dependency-scan.result }}" >> security-report.md
          printf -- "- SAST: %s\n" "${{ needs.sast.result }}" >> security-report.md
          printf -- "- License Check: %s\n" "${{ needs.license-check.result }}" >> security-report.md

          cat security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 90
