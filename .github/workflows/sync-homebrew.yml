# Sync Homebrew Formula
# Automatically syncs the Homebrew formula to homebrew-nself repository when updated
#
# This workflow runs when:
# 1. The Homebrew formula template is updated in .releases/homebrew/
# 2. A new release is published
#
# Required secrets:
# - HOMEBREW_TAP_TOKEN: Personal Access Token with repo scope for homebrew-nself

name: Sync Homebrew Formula

on:
  push:
    paths:
      - '.releases/homebrew/nself.rb'
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.4.8)'
        required: true
        type: string

jobs:
  sync-homebrew:
    name: Sync to homebrew-nself
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nself
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            VERSION="$RELEASE_TAG"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(cat src/VERSION | tr -d '\n')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/nself-org/cli/archive/refs/tags/v${VERSION}.tar.gz"

          # Download and calculate SHA256
          SHA256=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)

          if [[ -z "$SHA256" || "$SHA256" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]]; then
            echo "::error::Failed to download release tarball or got empty file"
            exit 1
          fi

          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "SHA256: ${SHA256}"

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          # Update the formula file
          sed -i "s|url \"https://github.com/nself-org/cli/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/nself-org/cli/archive/refs/tags/v${VERSION}.tar.gz\"|" .releases/homebrew/nself.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" .releases/homebrew/nself.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" .releases/homebrew/nself.rb

          cat .releases/homebrew/nself.rb

      - name: Checkout homebrew-nself
        id: checkout-tap
        # ADVISORY: HOMEBREW_TAP_TOKEN may not be configured - checkout failure is handled
        # gracefully by the conditional "Sync formula to tap" / "Skip tap sync" steps below
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: nself-org/homebrew-nself
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          path: homebrew-tap

      - name: Sync formula to tap
        if: steps.checkout-tap.outcome == 'success'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p homebrew-tap/Formula
          cp .releases/homebrew/nself.rb homebrew-tap/Formula/nself.rb

          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/nself.rb

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update nself to v${VERSION}"
            git push
            echo "::notice::Successfully updated homebrew-nself to v${VERSION}"
          fi

      - name: Skip tap sync (no token)
        if: steps.checkout-tap.outcome != 'success'
        run: |
          echo "::warning::HOMEBREW_TAP_TOKEN secret not configured or invalid - skipping tap sync"
          echo "::notice::Formula updated in main repo only"
          echo "::notice::To enable automatic Homebrew tap sync, configure HOMEBREW_TAP_TOKEN secret"
